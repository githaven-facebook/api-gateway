server:
  port: 8080
  admin_port: 9090
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s
  max_header_bytes: 1048576

auth:
  jwk_url: "http://auth-service:8081/jwks"
  issuer: "https://auth.facebook.internal"
  audiences:
    - "api-gateway"
    - "facebook-services"
  cache_ttl: 5m

rate_limit:
  enabled: true
  default_rps: 1000
  burst_size: 2000
  redis_addr: "redis:6379"
  redis_password: ""
  key_ttl: 1m

circuit_breaker:
  threshold: 5
  timeout: 30s
  max_half_open: 2

tracing:
  enabled: true
  endpoint: "http://jaeger:4317"
  sample_rate: 0.1
  service_name: "api-gateway"
